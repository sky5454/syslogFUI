name: syslogfui
description: A real-time syslog viewer desktop application with AI integration
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  web_socket_channel: ^3.0.3
  equatable: ^2.0.5
  intl: ^0.20.2
  csv: ^8.0.0
  path: ^1.8.3
  path_provider: ^2.1.5
  font_awesome_flutter: ^11.0.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: false
  uses-material-design: true
  assets:
    - bin/
