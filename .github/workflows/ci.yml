name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.26.2'
  FLUTTER_VERSION: '3.41.7'

jobs:
  # Test Go code
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Go tests
        run: |
          cd go
          go mod download
          go build -o go_build_test .
          go vet ./...
          rm -f go_build_test

  # Build and bundle Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend
        run: |
          cd go
          go build -ldflags="-s -w" -o ../bin/go_backend.exe .
          Copy-Item ../bin/go_backend.exe ../bin/go_backend

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Build Flutter Windows
        run: |
          flutter pub get
          flutter build windows --release

      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Build NSIS installer
        run: |
          $releaseDir = "$env:GITHUB_WORKSPACE/build/windows/x64/runner/Release"
          $installerDir = "$env:GITHUB_WORKSPACE/installer"
          $iconPath = "$env:GITHUB_WORKSPACE/windows/runner/resources/app_icon.ico"

          Set-Location $releaseDir
          Remove-Item -Recurse -Force installer_stage -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path installer_stage -Force | Out-Null
          Get-ChildItem -Path . -Recurse -Depth 0 | Where-Object { $_.Name -ne 'installer_stage' } | Copy-Item -Destination installer_stage/ -Force
          Copy-Item $iconPath installer_stage/ -Force -ErrorAction SilentlyContinue
          Set-Location installer_stage
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (-not (Test-Path $nsisPath)) { $nsisPath = "C:\Program Files\NSIS\makensis.exe" }
          $installerScript = $installerDir + "\installer.nsi"
          & $nsisPath -DRELEASE_BASE="${{ github.ref_name }}" "-DCONTENTS_DIR=." "-DOUTPUT_DIR=$releaseDir" "$installerScript"
          Copy-Item -Path ./*.exe -Destination $releaseDir/ -Force

      - name: Create zip package
        run: |
          Compress-Archive -Path "$env:GITHUB_WORKSPACE/build/windows/x64/runner/Release/*" -DestinationPath "$env:GITHUB_WORKSPACE/build/windows/x64/runner/Release/syslogfui_windows.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syslogfui_windows
          path: ${{ github.workspace }}/build/windows/x64/runner/Release/syslogfui_windows.zip

      - name: Rename NSIS installer
        run: |
          $installer = Get-ChildItem "$env:GITHUB_WORKSPACE/build/windows/x64/runner/Release" -Filter "syslogfui-*.exe" | Select-Object -First 1
          if ($installer) {
            Move-Item $installer.FullName "$env:GITHUB_WORKSPACE/build/windows/x64/runner/Release/syslogfui_windows_installer.exe"
          }

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: syslogfui_windows_installer
          path: ${{ github.workspace }}/build/windows/x64/runner/Release/syslogfui_windows_installer.exe

  # Build and bundle Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend
        run: |
          cd go
          CGO_ENABLED=0 go build -ldflags="-s -w" -o ../bin/go_backend .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev

      - name: Build Flutter Linux
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release

      - name: Create tar.gz package
        run: |
          cd build/linux/x64/release/bundle
          tar -czf $GITHUB_WORKSPACE/syslogfui_linux.tar.gz .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syslogfui_linux
          path: syslogfui_linux.tar.gz

  # Build and bundle macOS
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend
        run: |
          cd go
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o ../bin/go_backend_amd64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o ../bin/go_backend_arm64 .
          lipo -create -output ../bin/go_backend ../bin/go_backend_amd64 ../bin/go_backend_arm64

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Build Flutter macOS
        run: |
          flutter pub get
          flutter build macos --release

      - name: Bundle Go backend to Flutter app
        run: |
          mkdir -p "build/macos/Build/Products/Release/syslogfui.app/Contents/MacOS/"
          cp bin/go_backend "build/macos/Build/Products/Release/syslogfui.app/Contents/MacOS/"

      - name: Create DMG
        run: |
          app_path="build/macos/Build/Products/Release/syslogfui.app"
          stage_dir=$(mktemp -d)
          cp -R "$app_path" "$stage_dir/"
          ln -s /Applications "$stage_dir/Applications"
          hdiutil create -volname "SyslogFUI" -srcfolder "$stage_dir" -ov -format UDZO "SyslogFUI.dmg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: SyslogFUI.dmg

  # Create GitHub Release
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Windows package
        run: |
          mkdir -p release
          cp artifacts/*.zip release/
          ls artifacts/*.exe 2>/dev/null && cp artifacts/*.exe release/ || true

      - name: Create Linux package
        run: |
          cp artifacts/*.tar.gz release/

      - name: Create macOS packages
        run: |
          cp artifacts/*.dmg release/

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
