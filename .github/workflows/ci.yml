name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.26.2'
  FLUTTER_VERSION: '3.41.7'

jobs:
  # Test Go code
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Go tests
        run: |
          cd go
          go mod download
          go build -o /dev/null .
          go vet ./...

  # Test Flutter code
  test-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

  # Build and bundle Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend
        run: |
          cd go
          go build -ldflags="-s -w" -o go_backend.exe .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Build Flutter Windows
        run: |
          flutter pub get
          flutter build windows --release

      - name: Bundle Go backend
        run: |
          cp go/go_backend.exe build/windows/x64/runner/Release/

      - name: Create zip package
        run: |
          cd build/windows/x64/runner/Release
          powershell Compress-Archive -Path * -DestinationPath syslogfui_windows.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syslogfui_windows
          path: build/windows/x64/runner/Release/syslogfui_windows.zip

  # Build and bundle Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend
        run: |
          cd go
          CGO_ENABLED=0 go build -ldflags="-s -w" -o go_backend .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev

      - name: Build Flutter Linux
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release

      - name: Bundle Go backend
        run: |
          cp go/go_backend build/linux/x64/release/bundle/

      - name: Create tar.gz package
        run: |
          cd build/linux/x64/release/bundle
          tar -czf $GITHUB_WORKSPACE/syslogfui_linux.tar.gz .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syslogfui_linux
          path: syslogfui_linux.tar.gz

  # Build and bundle macOS Intel
  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend (Intel)
        run: |
          cd go
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o go_backend .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Build Flutter macOS
        run: |
          flutter pub get
          flutter build macos --release

      - name: Bundle Go backend
        run: |
          find build/macos/Build/Products/Release/ -name "syslog_viewer.app" -type d -exec cp go/go_backend "{}/Contents/MacOS/" \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syslogfui_macos_intel
          path: build/macos/Build/Products/Release/

  # Build and bundle macOS Apple Silicon
  build-macos-silicon:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend (Apple Silicon)
        run: |
          cd go
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o go_backend .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Build Flutter macOS
        run: |
          flutter pub get
          flutter build macos --release

      - name: Bundle Go backend
        run: |
          find build/macos/Build/Products/Release/ -name "syslog_viewer.app" -type d -exec cp go/go_backend "{}/Contents/MacOS/" \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syslogfui_macos_silicon
          path: build/macos/Build/Products/Release/
