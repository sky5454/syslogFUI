name: CI

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.26.2'
  FLUTTER_VERSION: '3.41.7'

jobs:
  # Test Go code
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run Go tests
        run: |
          cd go
          go mod download
          go build -o /dev/null .
          go vet ./...

  # Test Flutter code
  test-flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

  # Build and bundle Windows
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend
        run: |
          cd go
          go build -ldflags="-s -w" -o go_backend.exe .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Build Flutter Windows
        run: |
          flutter pub get
          flutter build windows --release

      - name: Bundle Go backend
        run: |
          cp go/go_backend.exe build/windows/x64/runner/Release/

      - name: Create zip package
        run: |
          cd build/windows/x64/runner/Release
          powershell Compress-Archive -Path * -DestinationPath syslogfui_windows.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syslogfui_windows
          path: build/windows/x64/runner/Release/syslogfui_windows.zip

  # Build and bundle Linux
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend
        run: |
          cd go
          CGO_ENABLED=0 go build -ldflags="-s -w" -o go_backend .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev

      - name: Build Flutter Linux
        run: |
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release

      - name: Bundle Go backend
        run: |
          cp go/go_backend build/linux/x64/release/bundle/

      - name: Create tar.gz package
        run: |
          cd build/linux/x64/release/bundle
          tar -czf $GITHUB_WORKSPACE/syslogfui_linux.tar.gz .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: syslogfui_linux
          path: syslogfui_linux.tar.gz

  # Build and bundle macOS
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            name: intel
            artifact: SyslogFUI_intel
          - arch: arm64
            name: silicon
            artifact: SyslogFUI_apple_silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend
        run: |
          cd go
          CGO_ENABLED=0 GOOS=darwin GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o go_backend .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Build Flutter macOS
        run: |
          flutter pub get
          flutter build macos --release

      - name: Bundle Go backend
        run: |
          find build/macos/Build/Products/Release/ -name "syslog_viewer.app" -type d -exec cp go/go_backend "{}/Contents/MacOS/" \;

      - name: Create DMG
        run: |
          app_path=$(find build/macos/Build/Products/Release/ -name "syslog_viewer.app" -type d | head -1)
          create-dmg \
            --volname "${{ matrix.artifact }}" \
            --window-pos 200 120 \
            --size 200 \
            --app-drop-link 560 120 \
            "${{ matrix.artifact }}.dmg" \
            "$app_path"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.name }}
          path: ${{ matrix.artifact }}.dmg

  # Create GitHub Release
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Windows package
        run: |
          mkdir -p release
          cp artifacts/*.zip release/

      - name: Create Linux package
        run: |
          cp artifacts/*.tar.gz release/

      - name: Create macOS packages
        run: |
          cp artifacts/*.dmg release/

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
