name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GO_VERSION: '1.21'
  FLUTTER_VERSION: '3.24.0'

jobs:
  # Build Go binaries for all platforms
  build-go:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            artifact: syslog_viewer_windows_amd64.exe
          - goos: windows
            goarch: arm64
            artifact: syslog_viewer_windows_arm64.exe
          - goos: linux
            goarch: amd64
            artifact: syslog_viewer_linux_amd64
          - goos: linux
            goarch: arm64
            artifact: syslog_viewer_linux_arm64
          - goos: darwin
            goarch: amd64
            artifact: syslog_viewer_darwin_amd64
          - goos: darwin
            goarch: arm64
            artifact: syslog_viewer_darwin_arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go binary
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          output="${{ matrix.artifact }}${ext}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -o "dist/go/${output}" .

      - name: Upload Go artifacts
        uses: actions/upload-artifact@v4
        with:
          name: go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/go/
          if-no-files-found: error

  # Build Flutter Windows desktop
  build-flutter-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Windows
        run: |
          flutter build windows --release --output-directory=dist/flutter/windows

      - name: Upload Flutter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows
          path: dist/flutter/windows/

  # Build macOS app bundle with DMG
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build Go binaries for macOS
        run: |
          mkdir -p dist/macos
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 \
            go build -ldflags="-s -w" -o dist/macos/syslog_viewer_darwin_amd64 .
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-s -w" -o dist/macos/syslog_viewer_darwin_arm64 .

      - name: Create macOS app bundle
        run: |
          mkdir -p SyslogViewer.app/Contents/MacOS
          cp dist/macos/syslog_viewer_darwin_amd64 SyslogViewer.app/Contents/MacOS/

          cat > SyslogViewer.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>syslog_viewer_darwin_amd64</string>
            <key>CFBundleIdentifier</key>
            <string>com.syslogviewer.app</string>
            <key>CFBundleName</key>
            <string>SyslogViewer</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
          </dict>
          </plist>
          EOF

      - name: Create DMG
        run: |
          create-dmg \
            --volname "SyslogViewer" \
            --window-pos 200 120 \
            --size 200 \
            --icon "SyslogViewer.app" 160 120 \
            --app-drop-link 560 120 \
            --hide-extension "SyslogViewer.app" \
            "SyslogViewer.dmg" \
            "SyslogViewer.app"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: SyslogViewer.dmg

  # Create release package
  release:
    needs: [build-go, build-flutter-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Windows package
        run: |
          mkdir -p release
          cp artifacts/go-windows-amd64/*.exe release/ 2>/dev/null || true
          cp artifacts/go-windows-arm64/*.exe release/ 2>/dev/null || true
          cp -r artifacts/flutter-windows/* release/ 2>/dev/null || true
          zip -r syslog_viewer_windows.zip release/

      - name: Create Linux package
        run: |
          mkdir -p release
          cp artifacts/go-linux-amd64/* release/ 2>/dev/null || true
          cp artifacts/go-linux-arm64/* release/ 2>/dev/null || true
          tar -czf syslog_viewer_linux.tar.gz release/

      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: .

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            syslog_viewer_windows.zip
            syslog_viewer_linux.tar.gz
            *.dmg
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
