name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GO_VERSION: '1.26.2'
  FLUTTER_VERSION: '3.41.7'

jobs:
  # Build Flutter Windows desktop with Go backend bundled
  build-flutter-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend for Windows
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o go_backend.exe .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Windows
        run: |
          flutter build windows --release --output-directory=dist/flutter/windows

      - name: Bundle Go backend with Flutter app
        run: |
          cp go_backend.exe dist/flutter/windows/runner/Release/

      - name: Upload Flutter artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows
          path: dist/flutter/windows/

  # Build Flutter Linux with Go backend bundled
  build-flutter-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go backend for Linux
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o go_backend .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Linux
        run: |
          flutter config --enable-linux-desktop
          flutter build linux --release --output-directory=dist/flutter/linux

      - name: Bundle Go backend with Flutter app
        run: |
          cp go_backend dist/flutter/linux/bundle/

      - name: Upload Flutter Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-linux
          path: dist/flutter/linux/

  # Build macOS app bundle with DMG and Go backend
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            artifact: SyslogFUI_intel
          - arch: arm64
            artifact: SyslogFUI_apple_silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Go binary for ${{ matrix.arch }}
        run: |
          mkdir -p dist/macos
          CGO_ENABLED=0 GOOS=darwin GOARCH=${{ matrix.arch }} \
            go build -ldflags="-s -w" -o dist/macos/go_backend .

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Build Flutter macOS
        run: |
          flutter pub get
          flutter build macos --release --output-directory=dist/flutter/macos

      - name: Create macOS app bundle with Go backend for ${{ matrix.arch }}
        run: |
          mkdir -p syslogfui.app/Contents/MacOS
          cp -R dist/flutter/macos/Build/Products/Release/*/syslogfui.app/Contents/MacOS/* syslogfui.app/Contents/MacOS/ 2>/dev/null || true
          cp dist/macos/go_backend syslogfui.app/Contents/MacOS/
          chmod -R +x syslogfui.app/

      - name: Ad-hoc sign macOS app
        run: |
          codesign --force --deep --sign - syslogfui.app

      - name: Create DMG for ${{ matrix.arch }}
        run: |
          create-dmg \
            --volname "${{ matrix.artifact }}" \
            --window-pos 200 120 \
            --size 200 \
            --icon "syslogfui.app" 160 120 \
            --app-drop-link 560 120 \
            --hide-extension "syslogfui.app" \
            "${{ matrix.artifact }}.dmg" \
            "syslogfui.app"

      - name: Upload DMG for ${{ matrix.arch }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: ${{ matrix.artifact }}.dmg

  # Create release package
  release:
    needs: [build-flutter-windows, build-flutter-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Windows package (Flutter app + Go backend)
        run: |
          mkdir -p release/windows
          cp -r artifacts/flutter-windows/runner/Release/* release/windows/
          zip -r syslogfui_windows.zip release/windows/

      - name: Create Linux package (Flutter app + Go backend)
        run: |
          mkdir -p release/linux
          cp -r artifacts/flutter-linux/bundle/* release/linux/
          tar -czf syslogfui_linux.tar.gz -C release/linux .

      - name: Download DMG files
        uses: actions/download-artifact@v4
        with:
          pattern: macos-*
          path: .
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            syslogfui_windows.zip
            SyslogFUI_intel.dmg
            SyslogFUI_apple_silicon.dmg
            syslogfui_linux.tar.gz
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
